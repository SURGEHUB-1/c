<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGpt</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f4f5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  #header{background:#1a1a1a;color:#fff;padding:14px 20px;font-weight:600;font-size:15px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  #header::before{content:"";width:10px;height:10px;background:#d97757;border-radius:50%;display:inline-block}
  #messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:18px}
  .message{max-width:88%;line-height:1.6;font-size:15px;animation:msgIn .35s cubic-bezier(.16,1,.3,1)}
  @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .user{align-self:flex-end;background:#1a1a1a;color:#fff;padding:12px 18px;border-radius:18px 18px 4px 18px}
  .bot{align-self:flex-start;background:#fff;color:#18181b;padding:18px 22px;border-radius:18px 18px 18px 4px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
  .bot pre{background:#27272a;color:#fafafa;padding:14px;border-radius:10px;overflow-x:auto;margin:10px 0;font-size:13px}
  .bot code{font-family:Menlo,Monaco,'Courier New',monospace}
  .bot p{margin-bottom:.9em}.bot p:last-child{margin-bottom:0}
  .bot ul,.bot ol{margin:8px 0 8px 20px}.bot li{margin:4px 0}
  #input-area{background:#fff;border-top:1px solid #e4e4e7;padding:14px 18px;display:flex;gap:10px;flex-shrink:0}
  #input{flex:1;border:1px solid #d4d4d8;border-radius:26px;padding:12px 18px;font-size:15px;outline:none}
  #input:focus{border-color:#d97757}
  #send{background:#1a1a1a;color:#fff;border:none;border-radius:26px;padding:12px 22px;cursor:pointer;font-weight:500;font-size:14px}
  #send:disabled{opacity:.4;cursor:not-allowed}
  .loading{display:flex;gap:5px;align-items:center;padding:14px 18px}
  .dot{width:7px;height:7px;background:#a1a1aa;border-radius:50%;animation:bounce 1.4s infinite ease-in-out both}
  .dot:nth-child(1){animation-delay:-.32s}.dot:nth-child(2){animation-delay:-.16s}
  @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
  .error{color:#dc2626;font-size:13px;margin-top:6px}
  #messages::-webkit-scrollbar{width:8px}#messages::-webkit-scrollbar-track{background:transparent}#messages::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:4px}
</style>
</head>
<body>
<div id="header">ChatGpt</div>
<div id="messages"></div>
<div id="input-area">
  <input type="text" id="input" placeholder="Ask anything..." autocomplete="off">
  <button id="send" onclick="sendMessage()">Send</button>
</div>
<script>
const messagesEl=document.getElementById('messages');
const inputEl=document.getElementById('input');
const sendBtn=document.getElementById('send');
const API_URL='/api/chat';
let conversation=[];

function notifyHeight(){
  window.parent.postMessage({height:document.documentElement.scrollHeight},'*');
}
new ResizeObserver(notifyHeight).observe(document.body);

function addMessage(html,role){
  const div=document.createElement('div');
  div.className=`message ${role}`;
  if(role==='bot'){
    div.innerHTML=marked.parse(html);
    div.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
  }else{
    div.textContent=html;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
  notifyHeight();
}
function setLoading(show){
  let el=document.getElementById('typing');
  if(show){
    if(el)return;
    el=document.createElement('div');
    el.id='typing';
    el.className='message bot loading';
    el.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    messagesEl.appendChild(el);
  }else if(el)el.remove();
  notifyHeight();
}
async function sendMessage(){
  const text=inputEl.value.trim();
  if(!text||sendBtn.disabled)return;
  inputEl.value='';
  addMessage(text,'user');
  conversation.push({role:'user',content:text});
  sendBtn.disabled=true;
  setLoading(true);
  try{
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversation})});
    const data=await res.json();
    setLoading(false);
    if(!res.ok||data.error)throw new Error(data.error||'API Error');
    conversation.push({role:'assistant',content:data.reply});
    addMessage(data.reply,'bot');
  }catch(err){
    setLoading(false);
    const d=document.createElement('div');
    d.className='message bot error';
    d.textContent='⚠️ '+err.message;
    messagesEl.appendChild(d);
  }finally{
    sendBtn.disabled=false;
    inputEl.focus();
    notifyHeight();
  }
}
inputEl.addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage()});
window.addEventListener('DOMContentLoaded',()=>addMessage("What’s on your mind today?",'bot'));
</script>
</body>
</html>
